<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Rental Deal Analyzer</title>
<style>
  :root{
    --ink:#14181F; --paper:#FBFAF7; --panel:#FFFFFF; --line:#E7E3DA; --muted:#726C5F; --faint:#9A9384;
    --go:#1F7A4D; --goSoft:#E8F1EB; --bad:#B23A2E; --badSoft:#F7EAE7; --warn:#9A6B12; --warnSoft:#F6EEDC; --inputBg:#FCFBF8;
    --mono:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,sans-serif; /* numbers: tabular sans */
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,sans-serif;
  }
  *{box-sizing:border-box;}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);margin:0;padding:20px 16px 48px;}
  .wrap{max-width:1100px;margin:0 auto;}
  h1{margin:4px 0 0;font-size:24px;font-weight:700;letter-spacing:-.01em;}
  .seg{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-weight:600;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;}
  .col{display:flex;flex-direction:column;gap:16px;min-width:0;}
  .grid{display:grid;grid-template-columns:1fr;gap:16px;}
  @media(min-width:860px){.grid{grid-template-columns:minmax(0,1fr) 380px;align-items:start;}.results{position:sticky;top:16px;}}
  input,select{font-family:var(--sans);}
  .in{width:100%;font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:13px;color:var(--ink);background:var(--inputBg);border:1px solid var(--line);
    border-radius:7px;padding:8px 10px;text-align:right;outline:none;transition:border-color .15s,box-shadow .15s;}
  .in:focus{border-color:var(--go);box-shadow:0 0 0 3px var(--goSoft);}
  .in.text{text-align:left;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:7px 0;}
  .lab{font-size:13px;color:var(--muted);}
  .out{font-family:var(--mono);font-variant-numeric:tabular-nums;}
  .chip{border:1px solid var(--line);background:var(--panel);border-radius:7px;padding:6px 10px;font-size:12.5px;color:var(--ink);cursor:pointer;}
  .chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .tab{font-size:13px;padding:7px 14px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--muted);cursor:pointer;}
  .tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink);font-weight:600;}
  .fieldwrap{position:relative;width:130px;}
  .aff{position:absolute;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:12px;color:var(--faint);}
  table{border-collapse:collapse;width:100%;min-width:460px;}
  @media(max-width:600px){
    body{padding:12px 10px 48px;}
    h1{font-size:20px;}
    .card{padding:12px 14px;}
    .in{font-size:16px;padding:10px;}
    .chip{padding:8px 12px;font-size:13px;}
    .tab{padding:9px 14px;}
    .fieldwrap{width:120px;}
  }
  input[type=number]{-moz-appearance:textfield;}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div style="max-width:1100px;margin:26px auto 0;padding:14px 16px 4px;border-top:1px solid var(--line);text-align:center;font-family:var(--sans);font-size:11.5px;color:var(--faint);line-height:1.6">Real Estate Investment Platform &middot; <b style="color:var(--muted);font-weight:600">v1.2</b> &middot; updated Jul 2026 &middot; screening aid only, not financial advice</div>
<script>
var _memStore={};
var store={
  get:function(k){try{return localStorage.getItem(k);}catch(e){return _memStore[k]||null;}},
  set:function(k,v){try{localStorage.setItem(k,v);}catch(e){_memStore[k]=v;}}
};
var _storageOk=(function(){try{localStorage.setItem('_t','1');localStorage.removeItem('_t');return true;}catch(e){return false;}})();
var C={ink:"#14181F",paper:"#FBFAF7",panel:"#FFFFFF",line:"#E7E3DA",muted:"#726C5F",faint:"#9A9384",
  go:"#1F7A4D",goSoft:"#E8F1EB",bad:"#B23A2E",badSoft:"#F7EAE7",warn:"#9A6B12",warnSoft:"#F6EEDC",inputBg:"#FCFBF8"};
var GREEN_D="#1F7A4D",AMBER_D="#9A6B12",RED_D="#B23A2E";
var GREEN_H="#5FC98C",AMBER_H="#E3B455",RED_H="#F08A7E";

var DEFAULT_DEAL={address:"404 E El Monte St, San Gabriel CA",price:1060000,dpPct:50,rate:7.37,termYears:30,
  closingPct:2.5,rehab:10000,aduBuildCost:0,unitCount:1,units:[3400,0,0,0,0,0],aduOn:false,aduRent:0,
  otherIncome:0,vacPct:5,taxPct:1.2,insurance:1500,hoa:0,pmPct:0,maintPct:1,utilities:0,apprPct:3,schoolRating:7,homeSqft:1180,lotSqft:8250};

function num(v){var n=parseFloat(v);return isNaN(n)?0:n;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function money(n){return (n<0?"-$":"$")+Math.abs(Math.round(n)).toLocaleString();}
function pct(n){return n.toFixed(1)+"%";}
function mult(n){return n.toFixed(2)+"x";}
function uid(){return Math.random().toString(36).slice(2,9);}
function normalize(d){var o=Object.assign({},DEFAULT_DEAL,d||{});var u=(d&&d.units)?d.units.slice():DEFAULT_DEAL.units.slice();while(u.length<6)u.push(0);o.units=u.slice(0,6);return o;}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function gradeMeta(g){
  if(g>=8.5)return{word:"Exceptional",color:C.go,soft:C.goSoft,hi:GREEN_H};
  if(g>=7)return{word:"Strong",color:C.go,soft:C.goSoft,hi:GREEN_H};
  if(g>=5.5)return{word:"Solid",color:C.warn,soft:C.warnSoft,hi:AMBER_H};
  if(g>=4)return{word:"Marginal",color:C.warn,soft:C.warnSoft,hi:AMBER_H};
  if(g>=2.5)return{word:"Weak",color:C.bad,soft:C.badSoft,hi:RED_H};
  return{word:"Poor",color:C.bad,soft:C.badSoft,hi:RED_H};
}

function compute(d){
  var price=num(d.price),dp=num(d.dpPct)/100,r=num(d.rate)/100/12,n=num(d.termYears)*12;
  var down=price*dp,loan=price-down,pi=0;
  if(loan>0&&n>0)pi=r===0?loan/n:(loan*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
  var closing=price*(num(d.closingPct)/100);
  var aduBuild=d.aduOn?num(d.aduBuildCost):0;
  var cashToClose=down+closing+num(d.rehab)+aduBuild;
  var unitRent=0;for(var i=0;i<d.unitCount;i++)unitRent+=num(d.units[i]);
  var aduRent=d.aduOn?num(d.aduRent):0;
  var grossMo=unitRent+aduRent+num(d.otherIncome);
  var grossYr=grossMo*12,vac=num(d.vacPct)/100,egi=grossYr*(1-vac);
  var occUnits=0;for(var j=0;j<d.unitCount;j++)if(num(d.units[j])>0)occUnits++;if(aduRent>0)occUnits++;
  var taxes=price*(num(d.taxPct)/100),pm=grossYr*(num(d.pmPct)/100),maint=price*(num(d.maintPct)/100);
  var opex=taxes+num(d.insurance)+num(d.hoa)+pm+maint+num(d.utilities);
  var noi=egi-opex,ds=pi*12,acf=noi-ds,mcf=acf/12;
  var cap=price>0?noi/price*100:0,coc=cashToClose>0?acf/cashToClose*100:0,grm=grossYr>0?price/grossYr:0,dscr=ds>0?noi/ds:0;
  var breakevenOcc=grossYr>0?(opex+ds)/grossYr*100:0;
  var pmPct=num(d.pmPct)/100,maintPct=num(d.maintPct)/100,taxPct=num(d.taxPct)/100;
  var k=(loan>0&&pi>0)?pi/loan:(r===0&&n>0?1/n:0);
  var fixedNonPrice=num(d.insurance)+num(d.hoa)+num(d.utilities);
  var denom=taxPct+maintPct+(1-dp)*k*12;
  var maxPrice=denom>0?(egi-fixedNonPrice-grossYr*pmPct)/denom:0;
  var fixedOpex=taxes+num(d.insurance)+num(d.hoa)+maint+num(d.utilities);
  var denom2=1-vac-pmPct;
  var beGrossYr=denom2>0?(ds+fixedOpex)/denom2:0;
  var beRentMo=beGrossYr/12;
  var cfPerUnit=mcf/Math.max(occUnits,1),appr=num(d.apprPct),school=num(d.schoolRating);
  var homeSqft=num(d.homeSqft),lotSqft=num(d.lotSqft);
  var ppsf=homeSqft>0?price/homeSqft:0;
  var sfHomePerK=(homeSqft>0&&price>0)?homeSqft/(price/1000):0;
  var sfLotPerK=(lotSqft>0&&price>0)?lotSqft/(price/1000):0;
  var factors=[
    {key:"Cash flow",w:.25,s:scoreCF(mcf),detail:money(mcf)+"/mo"},
    {key:"Debt safety (DSCR)",w:.20,s:scoreDSCR(dscr),detail:mult(dscr)},
    {key:"School quality",w:.20,s:clamp(school,0,10),detail:school.toFixed(0)+"/10"},
    {key:"Price per sq ft (home)",w:.15,s:homeSqft>0?clamp((1050-ppsf)/60,0,10):0,detail:homeSqft>0?"$"+Math.round(ppsf)+"/sf":"n/a"},
    {key:"Lot sq ft vs price",w:.10,s:sfLotPerK>0?clamp((sfLotPerK-1.5)/0.55,0,10):0,detail:sfLotPerK>0?sfLotPerK.toFixed(1)+" sf/$k":"n/a"},
    {key:"Appreciation (assumed)",w:.10,s:clamp(appr/5*10,0,10),detail:pct(appr)}
  ];
  var grade=0;for(var f=0;f<factors.length;f++)grade+=factors[f].w*factors[f].s;
  var gm=gradeMeta(grade);
  var verdict,vColor,vSoft,vNote;
  if(coc>=8){verdict="STRONG";vColor=C.go;vSoft=C.goSoft;vNote="Meets cash-on-cash and cash-flow targets.";}
  else if(mcf>=0&&coc>=4){verdict="MARGINAL";vColor=C.warn;vSoft=C.warnSoft;vNote="Positive cash flow but return below an 8% target.";}
  else if(mcf>=0){verdict="THIN";vColor=C.warn;vSoft=C.warnSoft;vNote="Barely positive - verify rents and expenses carefully.";}
  else{verdict="PASS";vColor=C.bad;vSoft=C.badSoft;vNote="Negative cash flow at these inputs.";}
  return{down:down,loan:loan,pi:pi,cashToClose:cashToClose,grossMo:grossMo,egi:egi,occUnits:occUnits,
    taxes:taxes,maint:maint,opex:opex,noi:noi,acf:acf,mcf:mcf,cap:cap,coc:coc,grm:grm,dscr:dscr,
    breakevenOcc:breakevenOcc,maxPrice:maxPrice,beRentMo:beRentMo,verdict:verdict,vColor:vColor,vSoft:vSoft,
    vNote:vNote,grade:grade,gm:gm,factors:factors,school:school};
}

var deals=[],currentId=null,view="analyze",showBreak=true,deal=null;

function load(){
  try{var r=store.get("rda_deals");if(r){deals=JSON.parse(r).map(function(x){return{id:x.id,name:x.name,deal:normalize(x.deal)};});}}catch(e){deals=[];}
  if(!deals.length){var id=uid();deals=[{id:id,name:"San Gabriel - El Monte St",deal:normalize(DEFAULT_DEAL)}];currentId=id;}
  else{try{var lo=store.get("rda_lastOpen");currentId=(lo&&deals.some(function(x){return x.id===lo;}))?lo:deals[0].id;}catch(e){currentId=deals[0].id;}}
  deal=deals.find(function(x){return x.id===currentId;}).deal;
}
function save(){try{store.set("rda_deals",JSON.stringify(deals));store.set("rda_lastOpen",currentId);}catch(e){}}
function currentName(){var e=deals.find(function(x){return x.id===currentId;});return e?e.name:"";}

function field(label,key,opt){opt=opt||{};var v=key.indexOf("unit")===0?deal.units[+key.slice(4)]:deal[key];
  return '<div class="row"><label class="lab" style="flex:1">'+label+'</label><div class="fieldwrap">'+
    (opt.prefix?'<span class="aff" style="left:9px">'+opt.prefix+'</span>':'')+
    '<input class="in" inputmode="decimal" data-key="'+key+'" step="'+(opt.step||"1")+'" value="'+esc(v)+'" '+
    'style="padding-left:'+(opt.prefix?20:10)+'px;padding-right:'+(opt.suffix?26:10)+'px"/>'+
    (opt.suffix?'<span class="aff" style="right:9px">'+opt.suffix+'</span>':'')+'</div></div>';}
function outRow(label,id,strong){return '<div class="row" style="border-top:1px dashed '+C.line+'">'+
  '<span class="lab" style="'+(strong?'font-weight:600;color:'+C.ink:'')+'">'+label+'</span>'+
  '<span class="out" id="'+id+'" style="font-size:'+(strong?15:13.5)+'px;font-weight:'+(strong?700:500)+'"></span></div>';}

function resultsHTML(m){
  var minis=[["Annual CF",money(m.acf),m.acf>=0],["Cash-on-cash",pct(m.coc),m.coc>=0],["Cap rate",pct(m.cap),true]];
  var h='<div style="background:'+C.ink+';border-radius:14px;padding:20px 20px 18px;color:'+C.paper+'">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">'+
      '<div><div class="seg" style="color:'+C.faint+'">Monthly cash flow</div>'+
      '<div class="out" style="font-size:34px;font-weight:700;letter-spacing:-.02em;margin-top:2px;color:'+(m.mcf>=0?GREEN_H:RED_H)+'">'+money(m.mcf)+'</div></div>'+
      '<div style="text-align:right"><div class="seg" style="color:'+C.faint+'">Grade</div>'+
      '<div class="out" style="font-size:34px;font-weight:700;letter-spacing:-.02em;margin-top:2px;color:'+m.gm.hi+'">'+m.grade.toFixed(1)+'<span style="font-size:15px;color:'+C.faint+'">/10</span></div>'+
      '<div style="font-size:12px;color:#C9C4B7;margin-top:1px">'+m.gm.word+'</div></div></div>'+
    '<div style="display:inline-flex;align-items:center;gap:8px;margin-top:12px;background:'+m.vSoft+';color:'+m.vColor+';border-radius:999px;padding:5px 12px;font-weight:700;font-size:12.5px;letter-spacing:.08em">'+m.verdict+'</div>'+
    '<p style="margin:10px 0 0;font-size:12.5px;color:#C9C4B7;line-height:1.45">'+m.vNote+'</p>'+
    '<div style="display:flex;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid #2A2F38">'+
    minis.map(function(x){return '<div><div style="font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#8C8778">'+x[0]+'</div><div class="out" style="font-size:15px;font-weight:700;margin-top:2px;color:'+(x[2]?GREEN_H:RED_H)+'">'+x[1]+'</div></div>';}).join('')+
    '</div></div>';
  h+='<div class="card" style="margin-top:16px"><div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" id="breakToggle"><div class="seg">Grade breakdown</div><span style="font-size:12px;color:'+C.faint+'">'+(showBreak?"hide":"show")+'</span></div>';
  if(showBreak){h+='<div style="margin-top:10px">'+m.factors.map(function(f){var col=f.s>=7?C.go:f.s>=4?C.warn:C.bad;
    return '<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">'+
      '<span style="color:'+C.muted+'">'+f.key+' <span style="color:'+C.faint+'">- '+Math.round(f.w*100)+'%</span></span>'+
      '<span class="out" style="color:'+C.ink+'">'+f.detail+' <span style="color:'+C.faint+'">('+f.s.toFixed(1)+')</span></span></div>'+
      '<div style="height:6px;background:'+C.line+';border-radius:999px;overflow:hidden"><div style="width:'+(f.s/10*100)+'%;height:100%;background:'+col+';border-radius:999px"></div></div></div>';}).join('')+
    '<p style="font-size:11px;color:'+C.faint+';margin:8px 0 0;line-height:1.5">Weighted 1-10 score. Cash-flow and debt-safety metrics drive 85%; school and appreciation are lightly-weighted assumptions.</p></div>';}
  h+='</div>';
  h+='<div class="card" style="margin-top:16px"><div class="seg">Return metrics</div>'+
    metricRow("Cap rate",pct(m.cap))+metricRow("Cash-on-cash",pct(m.coc),true)+metricRow("Gross rent multiplier",mult(m.grm))+
    metricRow("DSCR",mult(m.dscr))+metricRow("Break-even occupancy",pct(m.breakevenOcc))+metricRow("NOI / yr",money(m.noi))+'</div>';
  var beRatio=m.beRentMo>0?Math.min(1.5,m.grossMo/m.beRentMo):0;
  h+='<div class="card" style="margin-top:16px"><div class="seg">Break-even rent gauge</div>'+
    '<p style="font-size:12.5px;color:'+C.muted+';margin:8px 0 12px;line-height:1.45">Where current rent sits vs. the rent needed to cover all costs.</p>'+
    '<div style="position:relative;height:12px;background:'+C.line+';border-radius:999px;overflow:hidden">'+
    '<div style="position:absolute;left:0;top:0;bottom:0;width:'+(beRatio/1.5*100)+'%;background:'+(m.grossMo>=m.beRentMo?C.go:C.bad)+';border-radius:999px"></div>'+
    '<div style="position:absolute;left:'+(1/1.5*100)+'%;top:-3px;bottom:-3px;width:2px;background:'+C.ink+'"></div></div>'+
    '<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:'+C.faint+';font-family:'+'var(--mono)'+'"><span>current '+money(m.grossMo)+'</span><span>break-even '+money(m.beRentMo)+'</span></div></div>';
  h+='<div class="card" style="margin-top:16px"><div class="seg">Monthly summary</div>'+
    metricRow("Effective monthly rent (after vacancy)",money(m.egi/12))+
    metricRow("Monthly P&amp;I","-"+money(m.pi))+
    metricRow("Monthly operating expenses","-"+money(m.opex/12))+
    '<div class="row" style="border-top:1px solid '+C.line+';margin-top:4px">'+
    '<span class="lab" style="font-weight:600;color:'+C.ink+';font-size:14px">Net monthly cash flow</span>'+
    '<span class="out" style="font-size:18px;font-weight:700;color:'+(m.mcf>=0?C.go:C.bad)+'">'+money(m.mcf)+'</span></div>'+
    '<p style="font-size:11.5px;color:'+C.faint+';margin:8px 0 0;line-height:1.5">Effective monthly rent minus monthly P&amp;I and monthly operating expenses. Matches the cash flow shown above.</p></div>';
  h+='<div class="card" style="margin-top:16px"><div class="seg">Deal solver</div>'+
    metricRow("Max price for break-even CF",money(m.maxPrice))+metricRow("Rent needed for break-even CF",money(m.beRentMo)+"/mo")+
    '<p style="font-size:11.5px;color:'+C.faint+';margin:10px 0 0;line-height:1.5">Rents are estimates until verified against current comps. Screening tool only - confirm specifics with your lender and CPA.</p></div>';
  return h;
}
function metricRow(l,v,strong){return '<div class="row" style="border-top:1px dashed '+C.line+'"><span class="lab" style="'+(strong?'font-weight:600;color:'+C.ink:'')+'">'+l+'</span><span class="out" style="font-size:'+(strong?15:13.5)+'px;font-weight:'+(strong?700:500)+'">'+v+'</span></div>';}

function recompute(){
  var m=compute(deal);
  var map={out_down:money(m.down),out_loan:money(m.loan),out_pi:money(m.pi),out_cash:money(m.cashToClose),
    out_grossMo:money(m.grossMo),out_egi:money(m.egi),out_occ:String(m.occUnits),out_taxes:money(m.taxes),
    out_maint:money(m.maint),out_opex:money(m.opex),out_opexMo:money(m.opex/12)};
  for(var k in map){var el=document.getElementById(k);if(el)el.textContent=map[k];}
  var res=document.getElementById("results");if(res)res.innerHTML=resultsHTML(m);
  var bt=document.getElementById("breakToggle");if(bt)bt.onclick=function(){showBreak=!showBreak;recompute();};
}

function renderApp(){
  var app=document.getElementById("app");
  var m=compute(deal);
  var head='<div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px">'+
    '<div><div class="seg" style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:16px;background:'+m.gm.color+';display:inline-block;border-radius:2px"></span>Investment Platform</div>'+
    '<h1>Real Estate Investment Platform</h1><p style="margin:3px 0 0;font-size:13px;color:'+C.muted+'">Deal screening + portfolio tracking for SoCal rentals</p></div>';
  if(view==="analyze"){
    head+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
      '<select id="dealSelect" style="font-size:13px;padding:8px 10px;border-radius:7px;border:1px solid '+C.line+';background:'+C.panel+';color:'+C.ink+';max-width:200px">'+
      deals.map(function(x){return '<option value="'+x.id+'"'+(x.id===currentId?' selected':'')+'>'+esc(x.name)+'</option>';}).join('')+'</select>'+
      '<button class="chip" id="btnNew">+ New</button>'+
      '<button class="chip" id="btnDel"'+(deals.length<=1?' style="opacity:.4"':'')+'>Delete</button></div>';
  }
  head+='</div>';
  head+='<div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center">'+
    '<button class="tab'+(view==="analyze"?" active":"")+'" id="tabA">Analyze</button>'+
    '<button class="tab'+(view==="portfolio"?" active":"")+'" id="tabP">Portfolio</button>'+
    '<button class="tab'+(view==="deallog"?" active":"")+'" id="tabL">Deal Log</button>'+
    '<button class="tab'+(view==="compare"?" active":"")+'" id="tabC">Compare'+(deals.length>1?" - "+deals.length:"")+'</button>'+

function compareHTML(){

  var rows=[
    {l:"Grade",g:function(m){return m.grade;},f:function(v){return v.toFixed(1)+" /10";},b:"high",bold:true},
    {l:"Verdict",g:function(m){return m.verdict;},f:function(v){return v;},b:null},
    {l:"Monthly cash flow",g:function(m){return m.mcf;},f:money,b:"high",bold:true},
    {l:"Cash-on-cash",g:function(m){return m.coc;},f:pct,b:"high"},
    {l:"Cap rate",g:function(m){return m.cap;},f:pct,b:"high"},
    {l:"DSCR",g:function(m){return m.dscr;},f:mult,b:"high"},
    {l:"GRM",g:function(m){return m.grm;},f:mult,b:"low"},
    {l:"School rating",g:function(m){return m.school;},f:function(v){return v.toFixed(0)+"/10";},b:"high"},
    {l:"Break-even occ.",g:function(m){return m.breakevenOcc;},f:pct,b:"low"},
    {l:"Cash to close",g:function(m){return m.cashToClose;},f:money,b:"low"},
    {l:"Gross rent / mo",g:function(m){return m.grossMo;},f:money,b:"high"},
    {l:"NOI / yr",g:function(m){return m.noi;},f:money,b:"high"}
  ];
  function best(row){if(!row.b)return -1;var bi=0,bv=row.g(cols[0].m);for(var i=0;i<cols.length;i++){var v=row.g(cols[i].m);if(row.b==="high"?v>bv:v<bv){bv=v;bi=i;}}return bi;}
  var h='<div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table><thead><tr>'+
    '<th style="text-align:left;padding:14px 16px;background:'+C.ink+';color:'+C.paper+';font-size:11px;letter-spacing:.1em;text-transform:uppercase;position:sticky;left:0;z-index:2">Metric</th>';
  cols.forEach(function(c){h+='<th style="padding:12px 14px;background:'+C.ink+';color:'+C.paper+';text-align:right;min-width:130px">'+
    '<div style="font-size:13px;font-weight:700">'+esc(c.name)+'</div>'+
    '<div style="font-size:11px;margin-top:4px"><span style="background:'+c.m.gm.soft+';color:'+c.m.gm.color+';border-radius:999px;padding:1px 7px;font-weight:700">'+c.m.grade.toFixed(1)+'</span></div>'+
    '<button class="cmpOpen" data-id="'+c.id+'" style="margin-top:6px;font-size:11px;color:'+C.paper+';background:transparent;border:1px solid #3A3F48;border-radius:6px;padding:3px 8px;cursor:pointer">Open</button></th>';});
  h+='</tr></thead><tbody>';
  rows.forEach(function(row,ri){var bi=best(row);h+='<tr style="border-top:1px solid '+C.line+';background:'+(ri%2?C.inputBg:C.panel)+'">'+
    '<td style="padding:10px 16px;font-size:12.5px;color:'+C.muted+';position:sticky;left:0;background:'+(ri%2?C.inputBg:C.panel)+';font-weight:'+(row.bold?600:400)+'">'+row.l+'</td>';
    cols.forEach(function(c,i){var v=row.g(c.m),isBest=i===bi,color=C.ink;
      if(row.l==="Monthly cash flow")color=v>=0?C.go:C.bad;if(row.l==="Verdict")color=c.m.vColor;
      h+='<td class="out" style="padding:10px 14px;text-align:right;font-size:'+(row.bold?14:13)+'px;font-weight:'+(row.bold||isBest?700:500)+';color:'+color+';background:'+(isBest?C.goSoft:"transparent")+'">'+row.f(v)+'</td>';});
    h+='</tr>';});
  h+='</tbody></table></div><p style="font-size:11.5px;color:'+C.faint+';margin:0;padding:10px 16px;line-height:1.5">Green = best in row. Higher is better except GRM, break-even occupancy, and cash to close. Grade weights cash flow and debt safety over appreciation.</p></div>';
  return h;
}

  if(!portfolios||!portfolios.length)portfolios=[{id:uid(),name:"My Portfolio",props:[]}];

function curPf(){return portfolios[pfActive]||{props:[]};}
function mBetween(s){if(!s)return 0;var a=new Date(s),b=new Date();var m=(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth());return Math.max(0,m);}
function balAfter(loan,r,n,pi,k){if(k<=0)return loan;if(k>=n)return 0;if(r===0)return Math.max(0,loan-pi*k);return loan*Math.pow(1+r,k)-pi*((Math.pow(1+r,k)-1)/r);}
function pCalc(p){
  var price=num(p.price),dp=num(p.dpPct)/100,r=num(p.rate)/100/12,n=num(p.termYears)*12;
  var loan=price*(1-dp),pi=(loan>0&&n>0)?(r===0?loan/n:loan*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1)):0;
  var egi=num(p.rent)*12*(1-num(p.vacPct)/100);
  var taxesY=price*(num(p.taxPct)/100),mgmtMo=num(p.rent)*(num(p.pmPct)/100),maintMo=price*(num(p.maintPct)/100)/12;
  var otherMo=num(p.hoa)+mgmtMo+maintMo+num(p.utilities);
  var opex=(taxesY/12+num(p.insurance)/12+otherMo)*12;
  var pitiCalc=pi+taxesY/12+num(p.insurance)/12,piti=num(p.pitiOverride)>0?num(p.pitiOverride):pitiCalc;
  var mcf=egi/12-piti-otherMo,acf=mcf*12,noi=egi-opex,ds=pi*12;
  var cashInv=price*dp+price*(num(DEFAULTS.closingPct)/100);
  var cap=price>0?noi/price*100:0,coc=cashInv>0?acf/cashInv*100:0,dscr=ds>0?noi/ds:0;
  var made=Math.min(n,mBetween(p.loanStart||p.purchaseDate));
  var balNow=num(p.balOverride)>0?num(p.balOverride):balAfter(loan,r,n,pi,made);
  var equity=num(p.value)-balNow,paidOff=loan>0?(loan-balNow)/loan*100:0;
  return {loan:loan,pi:pi,piti:piti,noi:noi,acf:acf,mcf:mcf,cap:cap,coc:coc,dscr:dscr,equity:equity,balNow:balNow,paidOff:paidOff,cashInv:cashInv};
}

/* ---- inline SVG charts (no dependency) ---- */
function svgRevExp(props,res){
  if(!props.length)return "";
  var rows=props.map(function(p,i){var pm=num(p.rent)*(num(p.pmPct)/100),maint=num(p.price)*(num(p.maintPct)/100)/12,other=num(p.hoa)+pm+maint+num(p.utilities);
    return {name:p.name||"Property",rent:num(p.rent),piti:res[i].piti,other:other,cost:res[i].piti+other};});
  var max=Math.max(1,Math.max.apply(null,rows.map(function(r){return Math.max(r.rent,r.cost);})));
  var W=600,L=120,BW=380,rh=54,H=rows.length*rh+6,sc=function(v){return BW*v/max;};
  var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto">';
  rows.forEach(function(r,i){var y=i*rh+10;
    s+='<text x="0" y="'+(y+12)+'" font-size="12" fill="'+C.ink+'">'+esc(String(r.name).slice(0,16))+'</text>';
    s+='<rect x="'+L+'" y="'+y+'" width="'+sc(r.rent).toFixed(1)+'" height="14" rx="3" fill="'+C.go+'"/>';
    s+='<text x="'+(L+sc(r.rent)+6).toFixed(1)+'" y="'+(y+11)+'" font-size="10.5" fill="'+C.muted+'">'+money(r.rent)+'</text>';
    var y2=y+18;
    s+='<rect x="'+L+'" y="'+y2+'" width="'+sc(r.piti).toFixed(1)+'" height="14" rx="3" fill="'+C.bad+'"/>';
    s+='<rect x="'+(L+sc(r.piti)).toFixed(1)+'" y="'+y2+'" width="'+sc(r.other).toFixed(1)+'" height="14" fill="#E0A9A2"/>';
    s+='<text x="'+(L+sc(r.cost)+6).toFixed(1)+'" y="'+(y2+11)+'" font-size="10.5" fill="'+C.muted+'">'+money(r.cost)+'</text>';
  });
  s+='</svg>';
  return s+'<div style="display:flex;gap:14px;font-size:11px;color:'+C.muted+';margin-top:4px;flex-wrap:wrap">'+
    '<span><span style="display:inline-block;width:10px;height:10px;background:'+C.go+';border-radius:2px"></span> Rent</span>'+
    '<span><span style="display:inline-block;width:10px;height:10px;background:'+C.bad+';border-radius:2px"></span> PITI</span>'+
    '<span><span style="display:inline-block;width:10px;height:10px;background:#E0A9A2;border-radius:2px"></span> Other op ex</span></div>';
}
function svgCash(props,res){
  if(!props.length)return "";
  var vals=props.map(function(p,i){return {name:p.name||"Property",v:res[i].mcf};});
  var max=Math.max(1,Math.max.apply(null,vals.map(function(x){return Math.abs(x.v);})));
  var W=600,L=120,BW=360,rh=32,H=vals.length*rh+6;
  var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto">';
  vals.forEach(function(r,i){var y=i*rh+10;var w=BW*Math.abs(r.v)/max;var col=r.v<0?C.bad:C.go;
    s+='<text x="0" y="'+(y+13)+'" font-size="12" fill="'+C.ink+'">'+esc(String(r.name).slice(0,16))+'</text>';
    s+='<rect x="'+L+'" y="'+y+'" width="'+w.toFixed(1)+'" height="16" rx="3" fill="'+col+'"/>';
    s+='<text x="'+(L+w+6).toFixed(1)+'" y="'+(y+13)+'" font-size="10.5" fill="'+col+'">'+money(r.v)+'</text>';
  });
  s+='</svg>';return s;
}

function recomputeMargin(){
  var g=function(id){var e=document.getElementById(id);return e?num(e.value):0;};
  var arv=g("mgArv"),pur=g("mgPur"),reh=g("mgReh"),clo=g("mgClo"),hol=g("mgHol"),sel=g("mgSel"),wf=g("mgWf");
  marginData={arv:arv,pur:pur,reh:reh,clo:clo,hol:hol,sel:sel,wf:wf};saveMargin();
  var allIn=pur+reh+clo+hol+sel,profit=arv-allIn,margin=arv>0?profit/arv*100:0,mao=0.70*arv-reh;
  var t=marginTier(margin);
  var set=function(id,v){var e=document.getElementById(id);if(e)e.textContent=v;};
  set("mgAllin",money(allIn));set("mgProfit",money(profit));set("mgMao",money(mao));set("mgWfout",wf>0?money(wf):"—");
  var pct=document.getElementById("mgPct");if(pct){pct.textContent=margin.toFixed(1)+"%";pct.style.color=t.heroH;}
  var b=document.getElementById("mgBadge");if(b){b.textContent=t.label;b.style.background=t.soft;b.style.color=t.col;}
  ["mgtP","mgtW","mgtF","mgtB"].forEach(function(id){var e=document.getElementById(id);if(e)e.style.borderColor="transparent";});
  var on=document.getElementById({P:"mgtP",W:"mgtW",F:"mgtF",B:"mgtB"}[t.k]);if(on)on.style.borderColor=t.col;
}
function attachMargin(){

  var pull=document.getElementById("mgPull");if(pull)pull.onclick=function(){var d=deal;var s=function(id,v){var e=document.getElementById(id);if(e)e.value=v;};s("mgPur",Math.round(num(d.price)));s("mgReh",Math.round(num(d.rehab)));s("mgClo",Math.round(num(d.price)*(num(d.closingPct)/100)));recomputeMargin();};

    var g=function(id){var e=document.getElementById(id);return e?num(e.value):0;};
    var arv=g("mgArv"),pur=g("mgPur"),allIn=pur+g("mgReh")+g("mgClo")+g("mgHol")+g("mgSel"),profit=arv-allIn,margin=arv>0?profit/arv*100:0,t=marginTier(margin);

}

function scoreCF(m){if(m>=1000)return 10;if(m>=750)return 9;if(m>=500)return 8;if(m>=250)return 7;if(m>=150)return 6;if(m>=0)return 5;if(m>=-249)return 4;if(m>=-499)return 3;if(m>=-999)return 2;return 0;}
function scoreDSCR(d){if(d>=1.5)return 10;if(d>=1.4)return 9;if(d>=1.3)return 8;if(d>=1.2)return 7;if(d>=1.1)return 6;if(d>=1.0)return 5;if(d>=0.9)return 4;if(d>=0.8)return 2;return 0;}
/* ================= REPS HOURS LOG ================= */
var repsLog=[], repsYear=(new Date()).getFullYear();
var REPS_CATS=["Rental Operations","Acquisition","Leasing & Tenant Placement","Development","Construction"];
var swRunning=false, swStart=0, swTimer=null;
function loadReps(){try{var r=store.get("rp_repslog");repsLog=r?JSON.parse(r):[];}catch(e){repsLog=[];}
  try{var y=store.get("rp_repsyear");repsYear=y?parseInt(y,10):(new Date()).getFullYear();}catch(e){repsYear=(new Date()).getFullYear();}
  if(!repsYear||isNaN(repsYear))repsYear=(new Date()).getFullYear();}
function saveReps(){try{store.set("rp_repslog",JSON.stringify(repsLog));store.set("rp_repsyear",String(repsYear));}catch(e){}}
function repsYearsList(){var ys={},cy=(new Date()).getFullYear();ys[cy]=1;ys[cy-1]=1;ys[cy+1]=1;ys[repsYear]=1;repsLog.forEach(function(e){if(e.date)ys[new Date(e.date).getFullYear()]=1;});return Object.keys(ys).map(Number).sort(function(a,b){return b-a;});}
function repsPropOptions(){var names=["Portfolio-wide"];(portfolios||[]).forEach(function(pf){(pf.props||[]).forEach(function(p){if(p.name&&names.indexOf(p.name)<0)names.push(p.name);});});return names;}
function repsYearMinutes(y){return repsLog.reduce(function(s,e){return s+((e.date&&new Date(e.date).getFullYear()===y)?num(e.minutes):0);},0);}
function hm(min){min=Math.max(0,Math.round(min));return Math.floor(min/60)+"h "+(min%60)+"m";}
function repsBreakInner(){
  var cats=REPS_CATS.map(function(cat){var mn=repsLog.reduce(function(s,e){return s+((e.date&&new Date(e.date).getFullYear()===repsYear&&e.cat===cat)?num(e.minutes):0);},0);return {cat:cat,mn:mn};});
  var mx=Math.max.apply(null,cats.map(function(c){return c.mn;}).concat([1]));
  return cats.map(function(c){return '<div style="display:flex;align-items:center;gap:10px;padding:5px 0"><span style="width:170px;font-size:12.5px;color:'+C.muted+'">'+c.cat+'</span><span style="flex:1;height:8px;background:'+C.line+';border-radius:4px;overflow:hidden"><i style="display:block;height:100%;width:'+(c.mn/mx*100).toFixed(0)+'%;background:'+C.go+';border-radius:4px"></i></span><span class="out" style="width:74px;text-align:right;font-size:12.5px">'+hm(c.mn)+'</span></div>';}).join('');
}

function repsRefresh(){
  var minutes=repsYearMinutes(repsYear),hrs=minutes/60,col=hrs>=750?C.go:(hrs>=500?C.warn:C.bad),rem=Math.max(0,750-hrs);
  var big=document.getElementById("repsBig");if(big){big.textContent=hrs.toFixed(1);big.style.color=col;}
  var r=document.getElementById("repsRem");if(r)r.textContent=rem.toFixed(1);
  var bar=document.getElementById("repsBar");if(bar){bar.style.width=Math.min(100,hrs/750*100)+"%";bar.style.background=col;}
  var bk=document.getElementById("repsBreak");if(bk)bk.innerHTML=repsBreakInner();

function fmtSw(ms){var s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor(s%3600/60),ss=s%60,p=function(n){return(n<10?"0":"")+n;};return h>0?h+":"+p(m)+":"+p(ss):p(m)+":"+p(ss);}
function repsSwTick(){var el=document.getElementById("repsSw");if(!el){if(swTimer){clearInterval(swTimer);swTimer=null;}return;}el.textContent=fmtSw(Date.now()-swStart);}
function repsSwToggle(){
  if(!swRunning){swRunning=true;swStart=Date.now();if(swTimer)clearInterval(swTimer);swTimer=setInterval(repsSwTick,1000);repsSwTick();var b=document.getElementById("repsSwBtn");if(b)b.textContent="Stop stopwatch";}
  else{swRunning=false;if(swTimer){clearInterval(swTimer);swTimer=null;}var mins=Math.round((Date.now()-swStart)/60000);var t=new Date();repsLog.unshift({id:uid(),date:t.toISOString().slice(0,10),cat:REPS_CATS[0],activity:"",minutes:mins,property:"Portfolio-wide",createdAt:Date.now()});repsYear=t.getFullYear();saveReps();renderApp();}
}
function exportReps(){
  var list=repsLog.filter(function(e){return e.date&&new Date(e.date).getFullYear()===repsYear;}).slice().sort(function(a,b){return a.date<b.date?-1:(a.date>b.date?1:0);});
  var rows=list.map(function(e){return [e.date,e.cat,e.property||"Portfolio-wide",e.activity||"",(num(e.minutes)/60).toFixed(2)];});
  var total=list.reduce(function(s,e){return s+num(e.minutes);},0)/60;
  rows.push(["","","","TOTAL "+repsYear,total.toFixed(2)]);
  exportCSVrows(["Date","Category","Property","Activity","Hours"],rows,"reps-hours-"+repsYear+".csv");
}
function attachReps(){

  var add=document.getElementById("repsAdd");if(add)add.onclick=function(){var t=new Date();repsLog.unshift({id:uid(),date:t.toISOString().slice(0,10),cat:REPS_CATS[0],activity:"",minutes:0,property:"Portfolio-wide",createdAt:Date.now()});repsYear=t.getFullYear();saveReps();renderApp();};
  var cs=document.getElementById("repsCsv");if(cs)cs.onclick=exportReps;
  document.querySelectorAll("[data-rk]").forEach(function(inp){inp.oninput=function(){repsLog[+inp.getAttribute("data-ri")][inp.getAttribute("data-rk")]=inp.value;saveReps();repsRefresh();};});
  document.querySelectorAll("[data-rsel]").forEach(function(sel){sel.onchange=function(){repsLog[+sel.getAttribute("data-ri")][sel.getAttribute("data-rsel")]=sel.value;saveReps();repsRefresh();};});
  var setMin=function(i){var hEl=document.querySelector('[data-rh="'+i+'"]'),mEl=document.querySelector('[data-rm="'+i+'"]');if(!hEl||!mEl)return;repsLog[i].minutes=num(hEl.value)*60+num(mEl.value);saveReps();repsRefresh();};
  document.querySelectorAll("[data-rh]").forEach(function(inp){inp.oninput=function(){setMin(+inp.getAttribute("data-rh"));};});
  document.querySelectorAll("[data-rm]").forEach(function(inp){inp.oninput=function(){setMin(+inp.getAttribute("data-rm"));};});

function importAllJSON(file){var rd=new FileReader();rd.onload=function(){try{var d=JSON.parse(rd.result);

/* ===== REPS: per-row timer + add-property ===== */
var swRow=null, repsProps=null;

function saveRepsProps(){try{store.set("rp_repsprops",JSON.stringify(repsProps));}catch(e){}}
function repsPropOptions(){if(repsProps===null)loadRepsProps();var names=["Portfolio-wide"];(portfolios||[]).forEach(function(pf){(pf.props||[]).forEach(function(p){if(p.name&&names.indexOf(p.name)<0)names.push(p.name);});});repsProps.forEach(function(n){if(n&&names.indexOf(n)<0)names.push(n);});repsLog.forEach(function(e){if(e.property&&names.indexOf(e.property)<0)names.push(e.property);});return names;}

function repsTick(){
  if(swRow===null){if(swTimer){clearInterval(swTimer);swTimer=null;}return;}
  var e=repsLog[swRow];if(!e){swRow=null;if(swTimer){clearInterval(swTimer);swTimer=null;}return;}
  var totalMs=num(e.minutes)*60000+(Date.now()-swStart);
  var el=document.getElementById("repsRun"+swRow);if(el)el.textContent=fmtSw(totalMs);
  var extra=(e.date&&new Date(e.date).getFullYear()===repsYear)?(Date.now()-swStart)/60000:0;
  var big=document.getElementById("repsBig");if(big){var hrs=(repsYearMinutes(repsYear)+extra)/60;big.textContent=hrs.toFixed(1);big.style.color=hrs>=750?C.go:(hrs>=500?C.warn:C.bad);}
}
function attachReps(){

  var ap=document.getElementById("repsAddProp");if(ap)ap.onclick=function(){var n=prompt("Add a property name (appears in the Property dropdown):","");if(n===null)return;n=(n||"").trim();if(!n)return;if(repsProps===null)loadRepsProps();if(repsProps.indexOf(n)<0){repsProps.push(n);saveRepsProps();}renderApp();};
  document.querySelectorAll("[data-rpropdel]").forEach(function(b){b.onclick=function(){var name=b.getAttribute("data-rpropdel");var cnt=repsLog.filter(function(e){return e.property===name;}).length;var msg=cnt>0?('Remove "'+name+'"? '+cnt+' entr'+(cnt===1?'y':'ies')+' using it will be set to Portfolio-wide.'):('Remove "'+name+'"?');if(!confirm(msg))return;repsLog.forEach(function(e){if(e.property===name)e.property="Portfolio-wide";});if(repsProps===null)loadRepsProps();repsProps=repsProps.filter(function(x){return x!==name;});saveRepsProps();saveReps();renderApp();};});
  var cs=document.getElementById("repsCsv");if(cs)cs.onclick=exportReps;

  document.querySelectorAll("[data-rh]").forEach(function(inp){inp.oninput=function(){setMin(+inp.getAttribute("data-rh"));};});
  document.querySelectorAll("[data-rm]").forEach(function(inp){inp.oninput=function(){setMin(+inp.getAttribute("data-rm"));};});
  document.querySelectorAll("[data-rdel]").forEach(function(b){b.onclick=function(){if(!confirm("Delete this entry?"))return;if(swRow!==null){swRow=null;if(swTimer){clearInterval(swTimer);swTimer=null;}}repsLog.splice(+b.getAttribute("data-rdel"),1);saveReps();renderApp();};});
  document.querySelectorAll("[data-rstart]").forEach(function(b){b.onclick=function(){var i=+b.getAttribute("data-rstart");if(swRow!==null){repsLog[swRow].minutes=num(repsLog[swRow].minutes)+Math.round((Date.now()-swStart)/60000);}swRow=i;swStart=Date.now();saveReps();renderApp();};});

}
